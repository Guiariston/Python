{% extends "base.html" %}
{% block content %}

<div class="form-container">
    <h2>Editar Post</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="form-buttons">
            <button type="submit" class="btn-save">Salvar</button>
            <a href="{% url 'home' %}" class="btn-cancel">Cancelar</a>
        </div>
    </form>
</div>

<style>
    .form-container {
        background: #f9f9f9;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 24px;
        max-width: 600px;
    }
    .form-buttons { margin-top: 16px; display: flex; gap: 10px; }
    .btn-save {
        background-color: #4CAF50;
        color: white;
        padding: 8px 16px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 1em;
    }
    .btn-save:hover { background-color: #45a049; }
    .btn-cancel {
        background-color: #ccc;
        color: #333;
        padding: 8px 16px;
        border-radius: 6px;
        text-decoration: none;
    }
    .btn-cancel:hover { background-color: #bbb; }
</style>

{% endblock content %}
