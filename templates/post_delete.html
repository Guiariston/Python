{% extends "base.html" %}
{% block content %}

<div class="delete-container">
    <h2>Confirmar Exclusão</h2>
    <p>Tens certeza que deseja deletar o post <strong>{{ post.title }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <div class="form-buttons">
            <button type="submit" class="btn-delete">🗑️ Confirmar</button>
            <a href="{% url 'home' %}" class="btn-cancel">Cancelar</a>
        </div>
    </form>
</div>

<style>
    .delete-container {
        background: #fff5f5;
        border: 1px solid #f5c2c7;
        border-radius: 8px;
        padding: 24px;
        max-width: 500px;
    }
    .form-buttons { margin-top: 16px; display: flex; gap: 10px; }
    .btn-delete {
        background-color: #dc3545;
        color: white;
        padding: 8px 16px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 1em;
    }
    .btn-delete:hover { background-color: #b02a37; }
    .btn-cancel {
        background-color: #ccc;
        color: #333;
        padding: 8px 16px;
        border-radius: 6px;
        text-decoration: none;
    }
    .btn-cancel:hover { background-color: #bbb; }
</style>

{% endblock content %}
